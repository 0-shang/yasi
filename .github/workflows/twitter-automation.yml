name: Twitter Automation

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '.github/**'
      - 'README.md'
  schedule:
    - cron: '0 1-14 * * *'  # Runs every hour from 9:00 to 22:00 Beijing Time (1:00 to 14:00 UTC)
  workflow_dispatch:
    inputs:
      ignore_time_restriction:
        description: 'Ignore Beijing Time posting restrictions (9:00 - 22:00)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'tweets-automator/package.json'

    - name: Install dependencies
      run: |
        cd tweets-automator
        npm install

    - name: Run Publisher
      env:
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        WORKSPACE_PATH: "../"
        TWEETS_DIR: "../tweets/"
        MAX_TWEETS_PER_RUN: "1"
        IGNORE_TIME_RESTRICTION: ${{ github.event.inputs.ignore_time_restriction || 'false' }}
      run: |
        cd tweets-automator
        # 扫描并发布已批准的推文
        npm run publish

    - name: Commit and Push Changes back to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add tweets/
        
        # 仅在有更改时进行提交和推送，防止触发无限循环构建 (使用 [skip ci] 避免再次触发 Actions)
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update tweets [skip ci]" && git push)

    - name: Sync Tweets to Personal Website (ai-nav)
      env:
        PAT_GH: ${{ secrets.PAT_GH }}
      run: |
        if [ -z "${PAT_GH}" ]; then
          echo "Warning: PAT_GH secret is not configured. Skipping sync."
          exit 0
        fi
        
        if [ -d "tweets/published" ] && [ "$(ls -A tweets/published 2>/dev/null)" ]; then
          echo "Published tweets found. Starting sync to ai-nav repo..."
          git clone https://${PAT_GH}@github.com/0-shang/ai-nav.git temp-web
          mkdir -p temp-web/content/insights/feed
          cp -r tweets/published/*.md temp-web/content/insights/feed/
          cd temp-web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/insights/feed/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync published tweets from yasi" && git push)
          cd ..
          rm -rf temp-web
        else
          echo "No published tweets found to sync."
        fi
